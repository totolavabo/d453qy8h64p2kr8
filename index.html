
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Crafting Calculator - Mon Jeu</title>
    <style>
        body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; background: #1a1a1a; color: white; }
        .container { display: flex; width: 100%; }
        
        /* Colonne Gauche */
        .items-list { flex: 2; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .item-card { 
            background: #333; padding: 15px; border-radius: 8px; cursor: pointer; position: relative;
            border: 2px solid transparent; transition: 0.2s;
        }
        .item-card:hover { border-color: #00ffcc; }

        /* Tooltip (Survol) */
        .tooltip {
            visibility: hidden; width: 200px; background-color: #555; color: #fff; text-align: center;
            border-radius: 6px; padding: 5px; position: absolute; z-index: 1; bottom: 125%; left: 50%;
            margin-left: -100px; opacity: 0; transition: opacity 0.3s;
        }
        .item-card:hover .tooltip { visibility: visible; opacity: 1; }

        /* Colonne Droite */
        .shopping-list { flex: 1; background: #222; padding: 20px; border-radius: 8px; height: fit-content; position: sticky; top: 20px; }
        .craft-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dashed #444; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="items-list" id="itemsMenu">
            </div>

        <div class="shopping-list">
            <h2>Ma Liste de Craft</h2>
            <div id="selectedItems">
                <p>Cliquez sur un item pour l'ajouter.</p>
            </div>
            <hr>
            <h3>Total Matériaux :</h3>
            <ul id="totalResources"></ul>
            <button onclick="clearAll()" style="margin-top:20px; cursor:pointer;">Vider la liste</button>
        </div>
    </div>

    <script>
        // TA BASE DE DONNÉES (Ajoute tes items ici)
        const database = [
            { id: 1, name: "Épée en Fer", ingredients: { "Fer": 3, "Bois": 1 }, info: "Fer : Mines d'Est / Bois : Forêt" },
            { id: 2, name: "Bouclier", ingredients: { "Fer": 5, "Cuir": 2 }, info: "Cuir : Chasse aux loups" },
            { id: 3, name: "Potion Soin", ingredients: { "Herbe": 2, "Fiole": 1 }, info: "Herbe : Plaines / Fiole : Marchand" }
        ];

        let cart = [];

        function renderItems() {
            const menu = document.getElementById('itemsMenu');
            database.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <strong>${item.name}</strong>
                    <span class="tooltip">${item.info}</span>
                `;
                card.onclick = () => addToCart(item);
                menu.appendChild(card);
            });
        }

        function addToCart(item) {
            cart.push(item);
            updateUI();
        }

        function updateUI() {
            const listDiv = document.getElementById('selectedItems');
            const resUl = document.getElementById('totalResources');
            listDiv.innerHTML = "";
            resUl.innerHTML = "";

            let totals = {};

            // Afficher les items sélectionnés
            cart.forEach((item, index) => {
                listDiv.innerHTML += `<div class="craft-item">${item.name} <span style="color:red; cursor:pointer" onclick="removeItem(${index})">x</span></div>`;
                
                // Calculer les totaux
                for (let res in item.ingredients) {
                    totals[res] = (totals[res] || 0) + item.ingredients[res];
                }
            });

            // Afficher le total des ressources
            for (let res in totals) {
                resUl.innerHTML += `<li>${res} : <strong>${totals[res]}</strong></li>`;
            }
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateUI();
        }

        function clearAll() { cart = []; updateUI(); }

        renderItems();
    </script>
</body>
</html>
